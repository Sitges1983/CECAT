<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CECAT - Centre de Comandament Territorial de Catalunya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: calc(100vh - 140px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans overflow-hidden">

    <header class="bg-gray-900 border-b border-gray-800 p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
            <h1 class="text-xl font-black tracking-wider text-red-500">SISTEMA INTEGRAT D'EMERGÈNCIES | CATALUNYA</h1>
        </div>
        <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-4 bg-gray-950 px-3 py-1.5 rounded border border-gray-800 text-xs">
                <label class="flex items-center space-x-2 cursor-pointer text-blue-400">
                    <input type="checkbox" id="tick-cameres" class="rounded bg-gray-900 border-gray-700 text-blue-600 focus:ring-0">
                    <span>📹 Càmeres en Viu</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer text-amber-400">
                    <input type="checkbox" id="tick-panells" class="rounded bg-gray-900 border-gray-700 text-amber-600 focus:ring-0" checked>
                    <span>📟 Panells Informatius</span>
                </label>
            </div>
            <div class="text-sm text-gray-400 font-mono" id="live-clock">CARREGANT...</div>
        </div>
    </header>

    <main class="grid grid-cols-1 xl:grid-cols-5 gap-4 p-4 h-[calc(100vh-68px)]">
        
        <section class="bg-gray-900 border border-gray-800 rounded-lg p-4 flex flex-col overflow-hidden">
            <div class="flex items-center justify-between border-b border-gray-800 pb-2 mb-3">
                <h2 class="text-sm font-bold uppercase tracking-widest text-orange-500">🚆 Transport Ferroviari</h2>
                <span class="text-[10px] bg-orange-950 text-orange-400 px-1.5 py-0.5 rounded border border-orange-900 font-mono">ATM / INCIDÈNCIES</span>
            </div>
            <div id="trenes-list" class="flex-1 overflow-y-auto space-y-3 pr-1 text-xs">
                <div class="text-gray-500 text-center py-8 font-mono">Connectant amb l'estat de la xarxa...</div>
            </div>
        </section>

        <section class="xl:col-span-3 bg-gray-900 border border-gray-800 rounded-lg p-2 flex flex-col relative">
            <div id="map" class="rounded-lg overflow-hidden border border-gray-800"></div>
        </section>

        <section class="bg-gray-900 border border-gray-800 rounded-lg p-4 flex flex-col overflow-hidden">
            <div class="flex items-center justify-between border-b border-gray-800 pb-2 mb-3">
                <h2 class="text-sm font-bold uppercase tracking-widest text-red-500">⚠️ Trànsit Temps Real</h2>
                <span class="text-[10px] bg-red-950 text-red-400 px-1.5 py-0.5 rounded border border-red-900 font-mono">SCT</span>
            </div>
            <div id="incidencies-list" class="flex-1 overflow-y-auto space-y-3 pr-1 text-xs">
                <div class="text-gray-500 text-center py-8 font-mono">Sincronitzant SCT...</div>
            </div>
        </section>

    </main>

    <script>
        // 1. Rellotge
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleString('ca-ES', { timeZone: 'Europe/Madrid' }) + ' (BCN)';
        }
        setInterval(updateClock, 1000); 
        updateClock();

        // 2. Inicialització de Leaflet amb OpenStreetMap Estàndard
        const map = L.map('map').setView([41.75, 1.95], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Forçar renderitzat correcte
        setTimeout(() => { map.invalidateSize(); }, 400);

        // Grups de capes per als Ticks
        const layerCameres = L.layerGroup();
        const layerPanells = L.layerGroup().addTo(map); 

        // Escoltadors d'esdeveniments dels Ticks
        document.getElementById('tick-cameres').addEventListener('change', function(e) {
            if(e.target.checked) { map.addLayer(layerCameres); } else { map.removeLayer(layerCameres); }
        });
        document.getElementById('tick-panells').addEventListener('change', function(e) {
            if(e.target.checked) { map.addLayer(layerPanells); } else { map.removeLayer(layerPanells); }
        });

        // Funció d'ajuda per fer peticions usant el proxy AllOrigins (evita fallades de CORS)
        async function fetchWithProxy(url) {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            const wrapper = await response.json();
            return JSON.parse(wrapper.contents);
        }

        // 3. Incidències de Trànsit
        async function fetchTransit() {
            const listContainer = document.getElementById('incidencies-list');
            try {
                const data = await fetchWithProxy('https://analisi.transparenciacatalunya.cat/resource/636n-5b5g.json?$limit=40');
                listContainer.innerHTML = '';
                
                if(!data || data.length === 0) {
                    listContainer.innerHTML = '<div class="text-green-500 font-mono text-center py-4">🟢 Sense incidències viàries.</div>';
                    return;
                }

                data.forEach(inc => {
                    if(!inc.latitud || !inc.longitud) return;
                    
                    const item = document.createElement('div');
                    item.className = 'bg-gray-950 p-3 rounded border-l-4 border-red-600 border-y border-r border-gray-800 hover:border-gray-700 transition cursor-pointer';
                    item.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-red-400 bg-red-950/50 px-1.5 py-0.5 rounded text-[10px] border border-red-900">${inc.vvia || 'Via'} (Km ${inc.ptini || '?'})</span>
                        </div>
                        <p class="text-gray-300 font-medium text-[11px]">${inc.tipus || 'Incidència'}</p>
                        <p class="text-gray-400 text-[10px] mt-1">${inc.descripcio || ''}</p>
                    `;
                    item.onclick = () => map.setView([inc.latitud, inc.longitud], 14);
                    listContainer.appendChild(item);

                    L.marker([inc.latitud, inc.longitud])
                        .addTo(map)
                        .bindPopup(`<div class="text-gray-900 text-xs"><b>${inc.vvia || 'Via'}</b>: ${inc.descripcio || 'Incidència'}</div>`);
                });
            } catch (e) { 
                console.error(e);
                listContainer.innerHTML = '<div class="text-red-500 font-mono text-center py-4">⚠️ Error de connexió SCT</div>'; 
            }
        }

        // 4. Incidències de Trens (Línies i Transports Gencat)
        async function fetchTrenes() {
            const listContainer = document.getElementById('trenes-list');
            try {
                const data = await fetchWithProxy('https://analisi.transparenciacatalunya.cat/resource/92ee-9694.json?$limit=20');
                listContainer.innerHTML = '';

                if(!data || data.length === 0) {
                    listContainer.innerHTML = '<div class="text-green-500 font-mono text-center py-4">🟢 Circulació de trens normal.</div>';
                    return;
                }

                data.forEach(tren => {
                    const titol = tren.titol || 'Avís de transport';
                    const desc = tren.descripcio || 'Sense detalls adicionals';
                    const dataInici = tren.data_inici ? new Date(tren.data_inici).toLocaleDateString('ca-ES') : 'Ara';

                    const item = document.createElement('div');
                    item.className = 'bg-gray-950 p-3 rounded border-l-4 border-orange-500 border-y border-r border-gray-800';
                    item.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-orange-400 uppercase text-[10px]">Estat del Servei</span>
                            <span class="text-[9px] text-gray-500 font-mono">${dataInici}</span>
                        </div>
                        <p class="text-gray-300 font-semibold text-[11px] mb-1">${titol}</p>
                        <p class="text-gray-400 text-[10px] leading-relaxed">${desc}</p>
                    `;
                    listContainer.appendChild(item);
                });
            } catch (e) { 
                console.error(e);
                listContainer.innerHTML = '<div class="text-red-500 font-mono text-center py-4">⚠️ Error Rodalies/FGC</div>'; 
            }
        }

        // 5. Càmeres de Trànsit
        async function fetchCameres() {
            try {
                const data = await fetchWithProxy('https://analisi.transparenciacatalunya.cat/resource/9tbq-v22s.json?$limit=150');

                data.forEach(cam => {
                    if(!cam.latitud || !cam.longitud) return;
                    const imgUrl = `https://cit.transit.gencat.cat/cit/AppJava/views/camara.xhtml?id=${cam.id_camara}`;
                    
                    const camMarker = L.marker([cam.latitud, cam.longitud]);
                    camMarker.bindPopup(`
                        <div class="text-xs font-mono font-bold text-gray-900 mb-1">${cam.nom_camara || 'Càmera'}</div>
                        <img src="${imgUrl}" alt="Càmera SCT" style="width:240px; height:180px; border-radius:4px;" onerror="this.src='https://via.placeholder.com/240x180?text=Imatge+no+disponible'"/>
                    `, { maxWidth: 260 });

                    layerCameres.addLayer(camMarker);
                });
            } catch (e) { console.error("Error càmeres:", e); }
        }

        // 6. Panells Informatius
        async function fetchPanells() {
            try {
                const data = await fetchWithProxy('https://analisi.transparenciacatalunya.cat/resource/6vvf-923f.json?$limit=100');

                data.forEach(panell => {
                    if(!panell.latitud || !panell.longitud) return;

                    const l1 = panell.text_linia_1 || '';
                    const l2 = panell.text_linia_2 || '';
                    const l3 = panell.text_linia_3 || '';
                    
                    if(!l1 && !l2) return; 

                    const panellMarker = L.marker([panell.latitud, panell.longitud]);
                    panellMarker.bindPopup(`
                        <div style="background-color:black; color:#fbbf24; font-family:monospace; padding:8px; border-radius:4px; text-align:center; font-size:11px;">
                            ${l1}<br>${l2}<br>${l3}
                        </div>
                    `);

                    layerPanells.addLayer(panellMarker);
                });
            } catch (e) { console.error("Error panells:", e); }
        }

        // --- EXECUCIÓ INICIAL ---
        fetchTransit();
        fetchTrenes();
        fetchCameres();
        fetchPanells();

        // Refrescos automàtics cada 2 minuts
        setInterval(fetchTransit, 120000);
        setInterval(fetchTrenes, 120000);
    </script>
</body>
</html>
